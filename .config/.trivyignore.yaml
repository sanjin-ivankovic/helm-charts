---
# Trivy misconfig ignore rules for the helm-charts repo. This is the YAML
# ignorefile format — trivy ONLY parses it as YAML when the filename ends in
# .yaml/.yml (a plain `.trivyignore` is read as a flat ID list), so keep the
# .yaml suffix. Passed to scan:trivy-charts via --ignorefile.
#
# Each entry is auditable: a check ID, an optional `paths` scope (matched against
# the rendered <chart>.yaml the job scans — doublestar globs), and a statement.
# Keep entries scoped to a path wherever the acceptance is chart-specific so the
# check stays enforced everywhere else.

misconfigurations:
  # readOnlyRootFilesystem deferred (Tier-2 of the securityContext rollout).
  # The disk-writing charts run non-root with dropped capabilities (KSV-0118
  # cleared) but still write to their data dirs, so the root filesystem is not
  # yet read-only. Each chart carries a per-chart TODO; flip readOnly to true
  # and drop the relevant scope here once writable paths are verified on redeploy.
  - id: AVD-KSV-0014
    statement: "readOnlyRootFilesystem deferred for disk-writing charts; tracked by per-chart TODOs in values.yaml."

  # freshrss cannot run non-root: the upstream image is debian/apache with no
  # USER directive, binds the privileged port 80, and its entrypoint performs
  # root-only chown/sed work with no privilege drop. Hardening would require
  # forking the image. Accepted for this internal RSS reader.
  - id: AVD-KSV-0118
    paths:
      - "**/freshrss.yaml"
      - "freshrss.yaml"
    statement: "freshrss upstream apache image requires root (binds :80, root-only entrypoint); cannot run non-root without forking."

  # litellm must run as root: the ghcr.io/berriai/litellm-database image bakes
  # its prisma query engine under /root/.cache (mode 0700, root-only) with no
  # copy elsewhere, so a non-root uid cannot reach the engine and the proxy
  # crashes at startup. Verified by running the image. Everything else stays
  # locked down (readOnlyRootFilesystem, drop ALL caps, no privilege escalation).
  - id: AVD-KSV-0118
    paths:
      - "**/litellm.yaml"
      - "litellm.yaml"
    statement: "litellm-database image bakes prisma's engine under /root/.cache (0700); must run as root, otherwise hardened."
