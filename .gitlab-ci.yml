# ============================================
# Stages
# ============================================

stages:
  - build
  - detect
  - renovate
  - validate
  - package
  - publish
  - notify

# ============================================
# Variables
# ============================================

variables:
  # Docker images
  # renovate: datasource=docker depName=docker versioning=docker
  DOCKER_VERSION: "29.1.3"
  CI_IMAGE: "${CI_REGISTRY_IMAGE}/ci:latest"

  # Tool versions (tracked by Renovate)
  # renovate: datasource=docker depName=renovate/renovate
  RENOVATE_VERSION: "42.65"
  # renovate: datasource=docker depName=alpine/helm
  HELM_VERSION: "4.0.4"

  # Repository settings
  CHARTS_DIR: "charts"
  PACKAGES_DIR: ".packages"

  # Git configuration for change detection
  GIT_CLEAN_FLAGS: "none"
  GIT_DEPTH: 0

# ============================================
# Templates & Anchors
# ============================================

.base-job:
  image: $CI_IMAGE
  tags:
    - shared

.publish-job:
  extends: .base-job
  before_script:
    # Authenticate with GitLab container registry for publishing Helm charts
    - |
      echo "Logging in to container registry..."
      echo "$CI_REGISTRY_PASSWORD" | helm registry login "${CI_REGISTRY}" \
        -u "${CI_REGISTRY_USER}" \
        --password-stdin

# ============================================
# Build Stage (CI Image)
# ============================================

.build-image-gitlab:
  # Don't extend .base-job - use docker:cli directly (can't use CI image to build itself!)
  image: docker:${DOCKER_VERSION}-cli
  stage: build
  tags:
    - shared
  before_script:
    - echo "$CI_JOB_TOKEN" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - cd "$BUILD_CONTEXT"
    - |
      docker buildx build \
        --platform linux/amd64 \
        --cache-from type=registry,ref="$IMAGE_NAME:buildcache" \
        --cache-to type=inline \
        --build-arg HELM_VERSION=${HELM_VERSION} \
        -t "$IMAGE_NAME:latest" \
        --push \
        .

build:ci-image:
  extends: .build-image-gitlab
  variables:
    IMAGE_NAME: $CI_REGISTRY_IMAGE/ci
    BUILD_CONTEXT: docker/ci
  rules:
    # Don't build on schedules (Renovate)
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    # Rebuild on Renovate MRs that update CI dependencies
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\//'
      changes:
        - "docker/ci/**/*"
        - ".gitlab-ci.yml"
    # Rebuild on Renovate branches (fallback for branch pipelines)
    - if: '$CI_COMMIT_BRANCH =~ /^renovate\//'
      changes:
        - "docker/ci/**/*"
        - ".gitlab-ci.yml"
    # Rebuild on main branch when CI files change
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - "docker/ci/**/*"
        - ".gitlab-ci.yml"
    # Manual trigger via web UI
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ============================================
# Detect Stage
# ============================================
detect:changes:
  extends: .base-job
  stage: detect
  script:
    - chmod +x scripts/ci/*.sh scripts/ci/lib/*.sh
    - ./scripts/ci/detect-changes.sh > changed-charts.txt || echo "" > changed-charts.txt
    - |
      echo "======================================"
      echo "Changed charts detected:"
      if [ -s changed-charts.txt ]; then
        cat changed-charts.txt | while read chart; do
          echo "  - $chart"
        done
      else
        echo "  (none)"
      fi
      echo "======================================"
  artifacts:
    paths:
      - changed-charts.txt
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH =~ /^renovate\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ============================================
# Renovate Stage (Dependency Updates)
# ============================================

renovate:
  stage: renovate
  image: renovate/renovate:${RENOVATE_VERSION}
  before_script:
    - echo "GitLab API - $CI_API_V4_URL"
    - echo "Repository - $CI_PROJECT_PATH"
  variables:
    # Node.js configuration (suppress all warnings including DEP0169)
    NODE_NO_WARNINGS: "1"

    # GitLab platform configuration
    RENOVATE_PLATFORM: "gitlab"
    RENOVATE_ENDPOINT: $CI_API_V4_URL
    RENOVATE_AUTODISCOVER: "false"
    RENOVATE_REPOSITORIES: '["$CI_PROJECT_ID"]'

    # Behavior configuration
    RENOVATE_REQUIRE_CONFIG: "optional" # Options: "required", "optional", "ignored"
    RENOVATE_ONBOARDING: "false"

    # Logging
    LOG_LEVEL: "info"

    # GitLab-specific settings
    RENOVATE_GITLAB_IGNORE_APPROVALS: "false"
    RENOVATE_GITLAB_AUTOMERGE: "false"

    # Authentication tokens
    # RENOVATE_TOKEN: Inherited from CI/CD variable (GitLab PAT or Project Access Token with 'api' scope)
    #   - Required for creating MRs/issues
    #   - Without this, Renovate can only read (using CI_JOB_TOKEN)
    #   - Must be set in: Settings > CI/CD > Variables > Add Variable
    # GITHUB_COM_TOKEN: Inherited from CI/CD variable (for fetching GitHub release data)

    # Docker Hub authentication via RENOVATE_HOST_RULES (official method)
    # Set these in GitLab CI/CD Variables:
    #   - DOCKER_HUB_USERNAME: Your Docker Hub username
    #   - DOCKER_HUB_TOKEN: Your Docker Hub access token
    RENOVATE_HOST_RULES: '[{"matchHost":"docker.io","hostType":"docker","username":"${DOCKER_HUB_USERNAME}","password":"${DOCKER_HUB_TOKEN}"}]'

    # Performance optimization
    RENOVATE_REPOSITORY_CACHE: "enabled" # Options: "disabled", "enabled", "reset"
    RENOVATE_CACHE_DIR: /tmp/renovate/cache
    RENOVATE_PERSIST_REPO_DATA: "true"

    # Cache TTL configuration
    RENOVATE_CACHE_PRIVATE_PACKAGES: "true"

    # Dry run mode (set to 'full' for testing, leave empty for production)
    RENOVATE_DRY_RUN: "" # Options: "extract", "lookup", "full" or "" (to disable)

    # Prevent GitLab Runner from checking out the code (Renovate handles this)
    GIT_STRATEGY: none
  script:
    - renovate $RENOVATE_EXTRA_FLAGS
  cache:
    key: "renovate-cache"
    paths:
      - /tmp/renovate/cache
  rules:
    # Run on scheduled pipelines (configure in GitLab: CI/CD > Schedules)
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "renovate"'
      when: always
    # Manual trigger via web UI (with debug logging)
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
      variables:
        LOG_LEVEL: "debug"
        RENOVATE_DRY_RUN: "full"
  tags:
    - shared
  retry:
    max: 2
    when:
      - api_failure
      - runner_system_failure
      - stuck_or_timeout_failure
  timeout: 2 hours
  allow_failure: true

# ============================================
# Validate
# ============================================
#  |
#  |
#  V
# ============================================
# Stage 1 - Lint Scripts
# ============================================
lint-scripts:
  extends: .base-job
  stage: validate
  script:
    - shellcheck -x scripts/ci/*.sh scripts/ci/lib/*.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH =~ /^renovate\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - scripts/ci/**/*
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - scripts/ci/**/*

# ============================================
# Stage 2 - Chart Validation
# ============================================
validate:charts:
  extends: .base-job
  stage: validate
  script:
    - chmod +x scripts/ci/*.sh scripts/ci/lib/*.sh
    - |
      if [ ! -s changed-charts.txt ]; then
        echo "No charts to validate - skipping"
        exit 0
      fi

      echo "Validating charts..."
      FAILED=0

      cat changed-charts.txt | while read chart; do
        if [ -n "$chart" ]; then
          echo ""
          echo "======================================"
          echo "Validating: $chart"
          echo "======================================"
          if ! ./scripts/ci/validate-chart.sh "$chart"; then
            FAILED=1
          fi
        fi
      done

      exit $FAILED
  dependencies:
    - detect:changes
  needs:
    - detect:changes
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH =~ /^renovate\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ============================================
# Package Stage
# ============================================
package:charts:
  extends: .base-job
  stage: package
  script:
    - chmod +x scripts/ci/*.sh scripts/ci/lib/*.sh
    - |
      if [ ! -s changed-charts.txt ]; then
        echo "No charts to package - skipping"
        exit 0
      fi

      mkdir -p "$PACKAGES_DIR"
      echo "Packaging charts..."

      cat changed-charts.txt | while read chart; do
        if [ -n "$chart" ]; then
          echo ""
          echo "======================================"
          echo "Packaging: $chart"
          echo "======================================"
          ./scripts/ci/package-chart.sh "$chart"
        fi
      done

      echo ""
      echo "======================================"
      echo "Packaged files:"
      ls -lh "$PACKAGES_DIR/" || echo "  (none)"
      echo "======================================"
  artifacts:
    paths:
      - ${PACKAGES_DIR}/*.tgz
    expire_in: 7 days
  dependencies:
    - detect:changes
  needs:
    - detect:changes
    - validate:charts
  cache:
    key: helm-deps-${CI_COMMIT_REF_SLUG}
    paths:
      - charts/*/charts/
      - charts/*/Chart.lock
    policy: pull-push
    when: on_success
    untracked: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH =~ /^renovate\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ============================================
# Publish Stage
# ============================================
publish:charts:
  extends: .publish-job
  stage: publish
  script:
    - chmod +x scripts/ci/*.sh scripts/ci/lib/*.sh
    - |
      if [ ! -s changed-charts.txt ]; then
        echo "No charts to publish - skipping"
        exit 0
      fi

      echo "Publishing charts to registry..."
      FAILED=0

      cat changed-charts.txt | while read chart; do
        if [ -n "$chart" ]; then
          echo ""
          echo "======================================"
          echo "Publishing: $chart"
          echo "======================================"
          if ! ./scripts/ci/publish-chart.sh "$chart"; then
            FAILED=1
          fi
        fi
      done

      exit $FAILED
  dependencies:
    - detect:changes
    - package:charts
  needs:
    - detect:changes
    - package:charts
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: "$CI_COMMIT_TAG"
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - "charts/*/Chart.yaml"
      when: on_success
      allow_failure: false

publish:github-portfolio:
  extends: .base-job
  stage: publish
  before_script:
    # Configure SSH for GitHub
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # Copy SSH key from GitLab File variable (variable contains path to temp file)
    - cp "$GITHUB_SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    # Verify key was copied correctly
    - |
      if ! grep -q "BEGIN.*PRIVATE KEY" ~/.ssh/id_ed25519; then
        echo "ERROR: SSH key does not appear to be valid"
        echo "First line of key file:"
        head -n 1 ~/.ssh/id_ed25519
        exit 1
      fi
      echo "✅ SSH key loaded successfully"
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    # Configure Git
    - git config --global user.name "maintainer-user"
    - git config --global user.email "maintainer@example.com"
  script:
    - |
      echo "=========================================="
      echo "🚀 Publishing to GitHub Portfolio"
      echo "=========================================="
      echo ""

      # Run sanitization
      echo "🧹 Running sanitization..."
      cd tools/sanitize
      python3 sanitize_repo.py "${CI_PROJECT_DIR}" --single-commit --verbose

      echo ""
      echo "=========================================="

      # CRITICAL: Run verification (exits with code 1 if sensitive data found)
      echo "🔍 Running security verification..."
      echo ""
      python3 verify_sanitization.py

      # Only reaches here if verification passed
      echo ""
      echo "=========================================="
      echo "📦 Preparing GitHub push..."
      echo "=========================================="

      cd "${CI_PROJECT_DIR}_public"

      # Count files
      FILE_COUNT=$(find . -type f ! -path './.git/*' | wc -l)
      echo "Files to publish: $FILE_COUNT"
      echo ""

      # Initialize fresh git repository
      echo "Initializing git repository..."
      git init -b main
      git remote add github "$GITHUB_REPO_URL"

      # Stage all files
      git add -A
      STAGED_FILES=$(git diff --cached --numstat | wc -l)
      echo "Staged files: $STAGED_FILES"

      # Create commit
      COMMIT_MSG="Update portfolio - $(date '+%Y-%m-%d %H:%M:%S')

      Sanitization verified - no sensitive data detected

      Source: $CI_PROJECT_URL/-/commit/$CI_COMMIT_SHA
      Pipeline: $CI_PIPELINE_URL
      Trigger: $CI_PIPELINE_SOURCE"

      git commit -m "$COMMIT_MSG"
      COMMIT_HASH=$(git rev-parse --short HEAD)
      echo "Commit: $COMMIT_HASH"
      echo ""

      # Force push to GitHub
      echo "🔄 Force pushing to GitHub..."
      git push github main --force

      echo ""
      echo "=========================================="
      echo "✅ Successfully published to GitHub!"
      echo "=========================================="
      echo ""
      echo "📍 View at: https://github.com/maintainer-user/helm-charts"
      echo ""
  rules:
    # Skip if commit message contains [skip publish]
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip publish\]/'
      when: never

    # Run on schedule (daily at 4 AM)
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "github_sync"'
      when: always

    # Manual trigger option (via web UI)
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
  allow_failure: false # Fail pipeline if verification fails or push errors
  tags:
    - shared
  timeout: 15 minutes
  artifacts:
    when: on_failure
    paths:
      - tools/sanitize/reports/
    expire_in: 7 days

# ============================================
# Notify Stage
# ============================================

# Notify when validation and packaging completes (non-blocking)
notify:validated:
  extends: .base-job
  stage: notify
  script:
    - |
      echo ""
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  ✅  CHARTS VALIDATED AND PACKAGED"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo ""
      if [ -s changed-charts.txt ]; then
        echo "📦 Packaged Charts:"
        cat changed-charts.txt | while read chart; do
          echo "   ✓ $chart"
        done
        echo ""

      else
        echo "ℹ️  No charts changed in this commit"
      fi
      echo ""
      echo "🔗 Commit:  ${CI_COMMIT_SHORT_SHA}"
      echo "🌿 Branch:  ${CI_COMMIT_REF_NAME}"
      echo ""
  dependencies:
    - detect:changes
  needs:
    - detect:changes
    - package:charts
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: "$CI_COMMIT_TAG"
      when: on_success
    - if: '$CI_COMMIT_BRANCH =~ /^renovate\//'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - "charts/*/Chart.yaml"
      when: on_success

# Notify when charts are published to registry (after approval)
notify:published:
  extends: .base-job
  stage: notify
  script:
    - |
      echo ""
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  🎉  CHARTS PUBLISHED SUCCESSFULLY"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo ""
      if [ -s changed-charts.txt ]; then
        echo "🚀 Published Charts:"
        cat changed-charts.txt | while read chart; do
          echo "   ✓ $chart"
        done
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📦 Registry:    ${CI_REGISTRY_IMAGE}"
        echo "🔗 Commit:      ${CI_COMMIT_SHORT_SHA}"
        echo "🌿 Branch/Tag:  ${CI_COMMIT_REF_NAME}"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "📝 Install with:"
        echo "   helm pull oci://${CI_REGISTRY_IMAGE}/<chart-name> --version <version>"
        echo ""
      fi

      # Discord webhook notification (optional)
      # To enable: Set DISCORD_WEBHOOK_URL in GitLab CI/CD variables
      if [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
        CHART_LIST=$(cat changed-charts.txt | tr '\n' ', ' | sed 's/,$//')
        curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "embeds": [{
              "title": "🎉 Helm Charts Published",
              "description": "New chart versions have been published to the registry",
              "color": 5763719,
              "fields": [
                {
                  "name": "📦 Charts",
                  "value": "'"${CHART_LIST}"'",
                  "inline": false
                },
                {
                  "name": "🔗 Commit",
                  "value": "'"${CI_COMMIT_SHORT_SHA}"'",
                  "inline": true
                },
                {
                  "name": "🌿 Branch/Tag",
                  "value": "'"${CI_COMMIT_REF_NAME}"'",
                  "inline": true
                },
                {
                  "name": "📍 Registry",
                  "value": "'"${CI_REGISTRY_IMAGE}"'",
                  "inline": false
                }
              ],
              "footer": {
                "text": "GitLab CI/CD"
              },
              "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
            }]
          }' \
          "${DISCORD_WEBHOOK_URL}" || echo "⚠️  Discord notification failed (non-critical)"
      fi
  dependencies:
    - detect:changes
  needs:
    - detect:changes
    - job: publish:charts
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: "$CI_COMMIT_TAG"
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - "charts/*/Chart.yaml"
      when: on_success
