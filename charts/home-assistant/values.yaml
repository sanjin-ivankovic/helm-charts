#     mountPath: /panasonic_cc

## @section Service parameters

## @param service.type The Kubernetes service type (ClusterIP, NodePort, LoadBalancer, or ExternalName).
## @param service.port The service port.
## @param service.annotations Annotations to add to the service.
##
service:
  type: ClusterIP
  port: 8080
  annotations: {}

## @param additionalPorts List of additional ports to expose.
##
additionalPorts: []
#  - name: sia
#    containerPort: 8124
#    protocol: TCP

## @param additionalServices List of additional services to create.
##
additionalServices: []
#  - name: sia
#    port: 8124
#    targetPort: sia
#    type: NodePort
#    protocol: TCP
#    nodePort: 30124

## @section Ingress parameters

## @param ingress.enabled Enable ingress for Home Assistant.
## @param ingress.external Enable external ingress (cannot be true when ingress.enabled is true).
## @param ingress.className The ingress class name.
## @param ingress.labels Labels to add to the ingress.
## @param ingress.annotations Annotations to add to the ingress.
## @param ingress.hosts List of ingress hosts configuration.
## @param ingress.tls TLS configuration for the ingress.
##
ingress:
  enabled: false
  external: false
  className: ""
  labels: {}
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

## @section Storage parameters

## @param persistence.enabled Enable or disable persistence.
## @param persistence.accessMode Access mode for the persistent volume claim.
## @param persistence.size Size of the persistent volume claim.
## @param persistence.storageClass Storage class for the persistent volume claim.
## @param persistence.existingVolume Name of the existing volume for the StatefulSet. This option can be used to bind to an existing PV.
## @param persistence.existingClaim Name of the existing PVC to use with Deployment. This option can be used to use an existing PVC.
## @param persistence.annotations Annotations to add to the persistent volume claim.
## @param persistence.matchLabels Persistent Volume selectors (matchLabels).
## @param persistence.matchExpressions Persistent Volume selectors (matchExpressions).
## @param additionalVolumes List of additional volumes to mount.
## @param additionalMounts List of additional volume mounts.
##
persistence:
  enabled: false
  accessMode: ReadWriteOnce
  size: 5Gi
  storageClass: ""
  existingVolume: ""
  existingClaim: ""
  annotations: {}
  #  k8up.io/backup: "true"
  #  another-annotation: "value"
  matchLabels: {}
  matchExpressions: {}

additionalVolumes: []
  # - name: custom-components
  #   emptyDir: {}

  # - hostPath:
  #     path: >-
  #       /dev/serial/by-id/usb-Silicon_Labs_Sonoff_Zigbee_3.0_USB_Dongle_Plus_0001-if00-port0
  #     type: CharDevice
  #   name: usb

additionalMounts: []
  # - mountPath: /config/custom_components/panasonic_cc
  #   name: custom-components

  # - mountPath: /dev/ttyACM0
  #   name: usb

