## Default values for home-assistant

## @section Image parameters

## @param image.repository The Docker repository to pull the image from.
## @param image.pullPolicy The image pull policy.
## @param image.tag The image tag to use (overrides chart appVersion).
##
image:
  repository: ghcr.io/home-assistant/home-assistant
  pullPolicy: IfNotPresent
  tag: "2025.12.2"

## @param imagePullSecrets List of image pull secrets for private image repositories.
##
imagePullSecrets: []

## @param nameOverride Override the default name of the Helm chart.
## @param fullnameOverride Override the default full name of the Helm chart.
##
nameOverride: ""
fullnameOverride: ""

## @section Service Account parameters

## @param serviceAccount.create Specifies whether a service account should be created.
## @param serviceAccount.annotations Annotations to add to the service account.
## @param serviceAccount.name The name of the service account to use. If not set and create is true, a name is generated using the fullname template.
##
serviceAccount:
  create: true
  annotations: {}
  name: ""

## @section Deployment parameters

## @param replicaCount The number of replicas to deploy.
##
replicaCount: 1

## @param podAnnotations Annotations to add to the pod.
##
podAnnotations: {}

## @param updateStrategy The update strategy for the deployment. If not set and persistence is enabled, defaults to RollingUpdate with maxSurge: 0, maxUnavailable: 1 to prevent Multi-Attach errors.
## @param deploymentStrategy The deployment strategy type (RollingUpdate or Recreate). Used as fallback when updateStrategy is not set and persistence is disabled.
##
updateStrategy: {}
deploymentStrategy: RollingUpdate

## @param deploymentAnnotations Annotations to add to the deployment.
## @param statefulSetAnnotations Annotations to add to the stateful set.
##
deploymentAnnotations: {}
statefulSetAnnotations: {}

## @section Pod spec parameters

## @param resources Resource requests and limits for the container.
## @param nodeSelector Node selector for scheduling the pod on specific nodes.
## @param affinity Affinity settings for controlling pod scheduling.
## @param tolerations Tolerations for scheduling the pod based on node taints.
## @param securityContext Security context for the container.
## @param podSecurityContext Security context for the pod.
## @param priorityClassName Priority class name to set on Home Assistant pods.
## @param hostNetwork Specifies if the containers should be started in hostNetwork mode. Required for auto-discovery feature of Home Assistant.
## @param hostPort.enabled Enable hostPort mode.
## @param hostPort.port The port to expose on the host.
## @param dnsPolicy Pod's DNS policy. Options: Default, ClusterFirst, ClusterFirstWithHostNet, None.
## @param dnsConfig Pod's DNS configuration. Useful if you need to reduce the DNS load: set "ndots" to 0 and only use FQDNs.
##
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
nodeSelector: {}
affinity: {}
tolerations: []
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
podSecurityContext: {}
  # runAsUser: 568
  # runAsGroup: 568
  # fsGroup: 568
  # fsGroupChangePolicy: "OnRootMismatch"
priorityClassName: ""
hostNetwork: false
hostPort:
  enabled: false
  port: 8123
dnsPolicy: null
dnsConfig: {}
  # nameservers:
  #   - 1.2.3.4
  # searches:
  #   - ns1.svc.cluster-domain.example
  #   - my.dns.search.suffix
  # options:
  #   - name: ndots
  #     value: "2"

## @section Init Container parameters

## @param initContainers List of init containers to run before the main container.
##
initContainers: []
# Example of integrating a custom component before starting the Home Assistant container
# Uses emptyDir custom-components, see below
