[pytest]
# Pytest configuration for CI scripts

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
# --cov=<module> picks specific source files instead of the whole
# Python path (which was inflating coverage with stdlib stats).
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=ci_env
    --cov=common
    --cov=detect_changes
    --cov=validate_chart
    --cov=package_chart
    --cov=publish_chart
    --cov=notify
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml

[coverage:run]
omit =
    test_*.py
    */__pycache__/*
    */venv/*
    */virtualenv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
# Fail the suite if total coverage drops below this threshold.
# Current floor is set just below the actual 98% so a small refactor
# doesn't make the gate red, but a regression does.
fail_under = 95

[coverage:html]
directory = htmlcov
