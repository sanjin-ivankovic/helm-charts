---
# Renovate dependency-update workflow.
#
# Fires only on the cron schedule "renovate" (configured in the
# Woodpecker UI: Repo Settings > Crons > Add cron). Suggested
# schedule: "0 3 * * 1-5" (03:00 weekdays Europe/Berlin).
#
# Path filter intentionally absent — cron events carry no
# changed-files list, and we always want this to run.

when:
  - event: cron
    cron: renovate
  - event: manual

steps:
  - name: renovate
    # renovate: datasource=docker depName=renovate/renovate
    image: renovate/renovate:43.180
    environment:
      NODE_NO_WARNINGS: "1"
      LOG_LEVEL: info
      RENOVATE_PLATFORM: gitea
      RENOVATE_ENDPOINT: https://gitea.example.com/api/v1
      RENOVATE_AUTODISCOVER: "false"
      RENOVATE_REPOSITORIES: '["homelab/helm-charts"]'
      RENOVATE_REQUIRE_CONFIG: optional
      RENOVATE_ONBOARDING: "false"
      RENOVATE_REPOSITORY_CACHE: enabled
      RENOVATE_CACHE_DIR: .renovate-cache
      RENOVATE_PERSIST_REPO_DATA: "true"
      RENOVATE_CACHE_PRIVATE_PACKAGES: "true"
      RENOVATE_ALLOW_POST_UPGRADE_COMMAND_TEMPLATING: "true"
      RENOVATE_ALLOWED_COMMANDS: '["^sed "]'
      RENOVATE_TOKEN:
        from_secret: renovate_token
      GITHUB_COM_TOKEN:
        from_secret: renovate_github_com_token
      DOCKER_HUB_USERNAME:
        from_secret: docker_hub_username
      DOCKER_HUB_TOKEN:
        from_secret: docker_hub_token
    commands:
      # Build RENOVATE_HOST_RULES at runtime — Woodpecker's
      # environment: section does not expand variables, so the JSON
      # must be assembled in shell, not as a literal env value.
      - 'export RENOVATE_HOST_RULES="[{\"matchHost\":\"docker.io\",\"hostType\":\"docker\",\"username\":\"$DOCKER_HUB_USERNAME\",\"password\":\"$DOCKER_HUB_TOKEN\"}]"'
      - renovate
